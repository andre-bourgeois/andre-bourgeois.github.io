<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>André Bourgeois</title>
    <script>
      // SPA redirect for GitHub Pages — encodes the path into a query string
      // so the main index.html can restore it via history.replaceState.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
