<!-- v2 favicon block - paste into <head> of index.html -->

<!-- Primary: adaptive SVG (deep-teal on light tabs, bone on dark tabs) -->
<link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />

<!-- PNG fallbacks for browsers that don't honour SVG favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-dark-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-dark-16.png" />

<!-- iOS / iPadOS home-screen icon (gradient mark, padded) -->
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/favicon-dark-180.png" />
